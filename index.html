<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDG Londrina - Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="images/gdg-logo.png.png" alt="GDG Londrina" class="logo">
      <h1>Gerenciador de Tarefas</h1>
      <p class="subtitulo">GDG Londrina & Tech Week</p>
    </header>

    <div class="formulario">
      <input type="text" id="nova-tarefa" placeholder="Digite uma tarefa...">
      <button id="btn-adicionar">Adicionar</button>
    </div>

    <div class="contadores">
      <span>Pendentes: <strong id="contador-pendentes">0</strong></span>
      <span>Concluídas: <strong id="contador-concluidas">0</strong></span>
    </div>

    <ul id="lista-tarefas"></ul>

  </div>
  <script src="main.js"></script>
</body>
</html>
